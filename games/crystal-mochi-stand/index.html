<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="별점 모찌 상점은 투명 모찌를 길게 눌러 반짝 조각과 운세 카드를 모으는 HTML5 Canvas 미니게임입니다.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://alchegit.github.io/games/crystal-mochi-stand/">

    <meta property="og:title" content="별점 모찌 상점 | NeoKIM Game Cabinet">
    <meta property="og:description" content="투명 모찌를 길게 눌러 반짝 조각과 오늘의 작은 점괘를 모으는 귀여운 미니게임입니다.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://alchegit.github.io/games/crystal-mochi-stand/">
    <meta property="og:image" content="https://alchegit.github.io/og-thumbnail_250511.png?v=3">

    <title>별점 모찌 상점 | Crystal Mochi Stand</title>
    <link rel="stylesheet" href="./crystal-mochi-stand.css?v=20260701-6">
    <link rel="stylesheet" href="../i18n.css?v=20260708-1">
    <script defer src="../i18n.js?v=20260708-1"></script>
    <script defer src="./crystal-mochi-stand.js?v=20260701-6"></script>
  </head>
  <body>
    <main class="game-shell">
      <section class="game-board" aria-labelledby="gameTitle">
        <header class="game-header">
          <a class="back-link" href="../">/games</a>
          <div>
            <p class="kicker">Flutter + Flame study</p>
            <h1 id="gameTitle">별점 모찌 상점</h1>
          </div>
          <button id="restartButton" class="icon-button" type="button" aria-label="새 게임">↻</button>
        </header>

        <div class="hud-grid" aria-label="Game status">
          <div>
            <span>Score</span>
            <strong id="scoreValue">0</strong>
          </div>
          <div>
            <span>Time</span>
            <strong id="timeValue">60</strong>
          </div>
          <div>
            <span>Cards</span>
            <strong id="cardValue">0/12</strong>
          </div>
          <div>
            <span>Stars</span>
            <strong id="starValue">0</strong>
          </div>
          <div>
            <span>Streak</span>
            <strong id="streakValue">0</strong>
          </div>
          <div>
            <span>Best</span>
            <strong id="bestValue">0</strong>
          </div>
        </div>

        <div class="canvas-wrap">
          <canvas id="mochiCanvas" width="760" height="520" aria-label="별점 모찌 상점 게임판"></canvas>
          <div id="resultOverlay" class="result-overlay" hidden>
            <p id="resultKicker" class="result-kicker">Fortune Complete</p>
            <h2 id="resultTitle">점괘 정산</h2>
            <p id="resultCopy"></p>
            <button id="overlayRestartButton" class="primary-button" type="button">새 점괘</button>
          </div>
        </div>

        <footer class="game-footer">
          <p id="hintText">모찌를 길게 누른 뒤 반짝 고리에 가까울 때 놓아주세요.</p>
          <div class="footer-actions">
            <button id="buildPresetButton" class="secondary-button" type="button">프리셋</button>
            <button id="weeklyCardButton" class="secondary-button" type="button">주간 카드</button>
            <button id="weeklyCompareButton" class="secondary-button" type="button">친구비교</button>
            <button id="recordBookButton" class="secondary-button" type="button">기록</button>
            <div id="chargeBadge" class="charge-badge">charge 0%</div>
          </div>
        </footer>
      </section>

      <div id="recordBookOverlay" class="record-overlay" role="dialog" aria-modal="true" aria-labelledby="recordBookTitle" hidden>
        <div class="record-dialog">
          <header class="record-header">
            <div>
              <p class="record-kicker">Crystal Mochi Stand</p>
              <h2 id="recordBookTitle">카드북 기록</h2>
            </div>
            <button id="closeRecordBookButton" class="icon-button" type="button" aria-label="기록 닫기">×</button>
          </header>

          <div id="recordBookContent" class="record-content"></div>

          <footer class="record-actions">
            <button id="pinPresetButton" class="secondary-button" type="button">현재 프리셋 고정</button>
            <button id="resetPresetButton" class="secondary-button danger-button" type="button">현재 기록 리셋</button>
            <button id="clearArchiveButton" class="secondary-button danger-button" type="button">보관함 비우기</button>
          </footer>
        </div>
      </div>
    </main>
  </body>
</html>

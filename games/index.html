    <a class="skip-link" href="#gameGrid">게임 목록으로 이동</a>

        <div id="filterBar" class="filter-bar"></div>
      </section>

      <section id="gameGrid" class="game-grid" aria-live="polite">
        <p class="loading-copy">게임 목록을 불러오는 중입니다.</p>

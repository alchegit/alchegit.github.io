<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="마시멜로 슝 공방은 슬링샷으로 마시멜로를 날려 과자 블록을 정리하는 HTML5 Canvas 미니게임입니다.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://alchegit.github.io/games/marshmallow-sling-studio/">

    <meta property="og:title" content="마시멜로 슝 공방 | NeoKIM Game Cabinet">
    <meta property="og:description" content="마시멜로를 당겨 날리고 목표 과자 블록만 살짝 밀어내는 귀여운 슬링샷 퍼즐입니다.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://alchegit.github.io/games/marshmallow-sling-studio/">
    <meta property="og:image" content="https://alchegit.github.io/og-thumbnail_250511.png?v=3">

    <title>마시멜로 슝 공방 | Marshmallow Sling Studio</title>
    <link rel="stylesheet" href="./marshmallow-sling-studio.css?v=20260702-2">
    <script defer src="./marshmallow-sling-studio.js?v=20260702-2"></script>
  </head>
  <body>
    <main class="game-shell">
      <section class="game-board" aria-labelledby="gameTitle">
        <header class="game-header">
          <a class="back-link" href="../">/games</a>
          <div>
            <p class="kicker">Defold physics study</p>
            <h1 id="gameTitle">마시멜로 슝 공방</h1>
          </div>
          <button id="restartButton" class="icon-button" type="button" aria-label="새 게임">↻</button>
        </header>

        <div class="hud-grid" aria-label="Game status">
          <div>
            <span>Score</span>
            <strong id="scoreValue">0</strong>
          </div>
          <div>
            <span>Shots</span>
            <strong id="shotsValue">4</strong>
          </div>
          <div>
            <span>Targets</span>
            <strong id="targetValue">0/3</strong>
          </div>
          <div>
            <span>Power</span>
            <strong id="powerValue">0</strong>
          </div>
        </div>

        <div class="canvas-wrap">
          <canvas id="slingCanvas" width="800" height="520" aria-label="마시멜로 슝 공방 게임판"></canvas>
          <div id="resultOverlay" class="result-overlay" hidden>
            <p id="resultKicker" class="result-kicker">Workshop Closed</p>
            <h2 id="resultTitle">정리 결과</h2>
            <p id="resultCopy"></p>
            <button id="overlayRestartButton" class="primary-button" type="button">새 공방</button>
          </div>
        </div>

        <footer class="game-footer">
          <p id="hintText">마시멜로를 뒤로 당긴 뒤 놓아 분홍 별표 과자 블록을 테이블 밖으로 밀어내세요.</p>
          <div class="stage-panel" aria-label="Stage controls">
            <button id="prevStageButton" class="stage-button" type="button" aria-label="이전 스테이지">◀</button>
            <span id="stageLabel">1/4</span>
            <button id="nextStageButton" class="stage-button" type="button" aria-label="다음 스테이지">▶</button>
            <button id="replayButton" class="stage-button" type="button">궤적</button>
            <button id="shareReplayButton" class="stage-button" type="button">코드</button>
            <button id="replayLikeButton" class="stage-button" type="button">응원</button>
          </div>
          <div class="tool-pad" aria-label="Marshmallow tools">
            <button data-tool="bouncy" type="button">통통</button>
            <button data-tool="heavy" type="button">무거움</button>
            <button data-tool="sticky" type="button">끈적</button>
          </div>
        </footer>
      </section>
    </main>
  </body>
</html>

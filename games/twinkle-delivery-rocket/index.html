<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="빙글별 배달 로켓은 회전과 추진만으로 별 우편함에 편지를 배달하는 HTML5 Canvas 미니게임입니다.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://alchegit.github.io/games/twinkle-delivery-rocket/">

    <meta property="og:title" content="빙글별 배달 로켓 | NeoKIM Game Cabinet">
    <meta property="og:description" content="회전과 추진만으로 별 우편함을 순서대로 방문하는 귀여운 관성 조작 게임입니다.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://alchegit.github.io/games/twinkle-delivery-rocket/">
    <meta property="og:image" content="https://alchegit.github.io/og-thumbnail_250511.png?v=3">

    <title>빙글별 배달 로켓 | Twinkle Delivery Rocket</title>
    <link rel="stylesheet" href="./twinkle-delivery-rocket.css?v=20260713-stampring1">
    <link rel="stylesheet" href="../i18n.css?v=20260708-1">
    <script defer src="../i18n.js?v=20260708-1"></script>
    <script defer src="./twinkle-delivery-rocket.js?v=20260713-stampring1"></script>
  </head>
  <body>
    <main class="game-shell">
      <section class="game-board" aria-labelledby="gameTitle">
        <header class="game-header">
          <a class="back-link" href="../">/games</a>
          <div>
            <p class="kicker">Defold rotate + move study</p>
            <h1 id="gameTitle">빙글별 배달 로켓</h1>
          </div>
          <button id="restartButton" class="icon-button" type="button" aria-label="새 게임">↻</button>
        </header>

        <div class="hud-grid" aria-label="Game status">
          <div>
            <span>Score</span>
            <strong id="scoreValue">0</strong>
          </div>
          <div>
            <span>Time</span>
            <strong id="timeValue">70</strong>
          </div>
          <div>
            <span>Mail</span>
            <strong id="mailValue">0/3</strong>
          </div>
          <div>
            <span>Speed</span>
            <strong id="speedValue">0</strong>
          </div>
        </div>

        <div class="canvas-wrap">
          <canvas id="rocketCanvas" width="800" height="520" aria-label="빙글별 배달 로켓 게임판"></canvas>
          <div id="resultOverlay" class="result-overlay" hidden>
            <p id="resultKicker" class="result-kicker">Delivery Complete</p>
            <h2 id="resultTitle">배달 정산</h2>
            <p id="resultCopy"></p>
            <button id="overlayRestartButton" class="primary-button" type="button">새 배달</button>
          </div>
        </div>

        <footer class="game-footer">
          <p id="hintText">화면 왼쪽/오른쪽은 회전, 가운데는 추진입니다. 목표 링에 부드럽게 들어가 보세요.</p>
          <div class="mission-panel" aria-label="Delivery mission controls">
            <div class="course-switcher" aria-label="Course select">
              <button id="prevCourseButton" class="tool-button" type="button" aria-label="이전 코스">◀</button>
              <span id="courseLabel">1/4</span>
              <button id="nextCourseButton" class="tool-button" type="button" aria-label="다음 코스">▶</button>
            </div>
            <div id="skinControls" class="skin-controls" aria-label="로켓 스킨"></div>
            <button id="shareResultButton" class="tool-button" type="button">카드</button>
            <button id="cardLikeButton" class="tool-button" type="button">응원</button>
          </div>
          <div class="control-pad" aria-label="Rocket controls">
            <button data-control="left" type="button" aria-label="왼쪽 회전">◀</button>
            <button data-control="thrust" type="button" aria-label="추진">▲</button>
            <button data-control="right" type="button" aria-label="오른쪽 회전">▶</button>
          </div>
        </footer>
      </section>
    </main>
  </body>
</html>

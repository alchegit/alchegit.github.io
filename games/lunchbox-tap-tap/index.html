<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="도시락 탭탭 키친은 빛나는 도시락 칸을 순서대로 탭해 반찬 스티커를 채우는 HTML5 Canvas 반응 게임입니다.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://alchegit.github.io/games/lunchbox-tap-tap/">

    <meta property="og:title" content="도시락 탭탭 키친 | NeoKIM Game Cabinet">
    <meta property="og:description" content="빛나는 도시락 칸을 빠르게 탭하고 스티커 콤보를 채우는 귀여운 리듬 반응 게임입니다.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://alchegit.github.io/games/lunchbox-tap-tap/">
    <meta property="og:image" content="https://alchegit.github.io/og-thumbnail_250511.png?v=3">

    <title>도시락 탭탭 키친 | Lunchbox Tap Tap</title>
    <link rel="stylesheet" href="./lunchbox-tap-tap.css?v=20260702-2">
    <link rel="stylesheet" href="../i18n.css?v=20260708-1">
    <script defer src="../i18n.js?v=20260708-1"></script>
    <script defer src="./lunchbox-tap-tap.js?v=20260713-beat1"></script>
  </head>
  <body>
    <main class="game-shell">
      <section class="game-board" aria-labelledby="gameTitle">
        <header class="game-header">
          <a class="back-link" href="../">/games</a>
          <div>
            <p class="kicker">Solar2D tap timing study</p>
            <h1 id="gameTitle">도시락 탭탭 키친</h1>
          </div>
          <button id="restartButton" class="icon-button" type="button" aria-label="새 게임">↻</button>
        </header>

        <div class="hud-grid" aria-label="Game status">
          <div>
            <span>Time</span>
            <strong id="timeValue">30</strong>
          </div>
          <div>
            <span>Bento</span>
            <strong id="bentoValue">0/18</strong>
          </div>
          <div>
            <span>Judge</span>
            <strong id="judgeValue">READY</strong>
          </div>
          <div>
            <span>Combo</span>
            <strong id="comboValue">0</strong>
          </div>
          <div>
            <span>Cards</span>
            <strong id="cardValue">0/9</strong>
          </div>
          <div>
            <span>Score</span>
            <strong id="scoreValue">0</strong>
          </div>
        </div>

        <div class="canvas-wrap">
          <canvas id="lunchCanvas" width="800" height="520" aria-label="도시락 탭탭 키친 게임판"></canvas>
          <div id="resultOverlay" class="result-overlay" hidden>
            <p id="resultKicker" class="result-kicker">Kitchen Closed</p>
            <h2 id="resultTitle">도시락 결과</h2>
            <p id="resultCopy"></p>
            <button id="overlayRestartButton" class="primary-button" type="button">새 도시락</button>
          </div>
        </div>

        <footer class="game-footer">
          <p id="hintText">빛나는 칸을 박자에 맞춰 탭하고, 하늘색 예고 칸으로 다음 박자를 준비하세요.</p>
          <div class="action-row">
            <button id="dailyButton" class="secondary-button" type="button">오늘 메뉴</button>
            <button id="stickerButton" class="secondary-button" type="button">스티커</button>
            <button id="cardButton" class="primary-button" type="button">결과 카드</button>
            <button id="compareButton" class="secondary-button" type="button">친구비교</button>
          </div>
        </footer>
      </section>
    </main>
  </body>
</html>

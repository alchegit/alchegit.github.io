<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="비스킷 해양 조약은 한 버튼으로 비스킷 함대를 생산해 잼 항로를 밀어내는 HTML5 Canvas 자동 전략 미니게임입니다.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://alchegit.github.io/games/pax-biscuitica/">

    <meta property="og:title" content="비스킷 해양 조약 | NeoKIM Game Cabinet">
    <meta property="og:description" content="생산 타이밍을 맞춰 비스킷 함대를 보내고 잼 기지를 밀어내는 귀여운 원버튼 전략 게임입니다.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://alchegit.github.io/games/pax-biscuitica/">
    <meta property="og:image" content="https://alchegit.github.io/og-thumbnail_250511.png?v=3">

    <title>비스킷 해양 조약 | Pax Biscuitica</title>
    <link rel="stylesheet" href="./pax-biscuitica.css?v=20260701-1">
    <link rel="stylesheet" href="../i18n.css?v=20260708-1">
    <script defer src="../i18n.js?v=20260708-1"></script>
    <script defer src="./pax-biscuitica.js?v=20260701-1"></script>
  </head>
  <body>
    <main class="game-shell">
      <section class="game-board" aria-labelledby="gameTitle">
        <header class="game-header">
          <a class="back-link" href="../">/games</a>
          <div>
            <p class="kicker">libGDX one-button strategy study</p>
            <h1 id="gameTitle">비스킷 해양 조약</h1>
          </div>
          <button id="restartButton" class="icon-button" type="button" aria-label="새 게임">↻</button>
        </header>

        <div class="hud-grid" aria-label="Game status">
          <div>
            <span>Jam Base</span>
            <strong id="enemyBaseValue">100</strong>
          </div>
          <div>
            <span>Biscuit Base</span>
            <strong id="playerBaseValue">100</strong>
          </div>
          <div>
            <span>Dough</span>
            <strong id="doughValue">0</strong>
          </div>
          <div>
            <span>Score</span>
            <strong id="scoreValue">0</strong>
          </div>
        </div>

        <div class="canvas-wrap">
          <canvas id="fleetCanvas" width="800" height="520" aria-label="비스킷 해양 조약 게임판"></canvas>
          <div id="resultOverlay" class="result-overlay" hidden>
            <p id="resultKicker" class="result-kicker">Treaty Signed</p>
            <h2 id="resultTitle">항로 결과</h2>
            <p id="resultCopy"></p>
            <button id="overlayRestartButton" class="primary-button" type="button">새 항로</button>
          </div>
        </div>

        <footer class="game-footer">
          <p id="hintText">노란 구간에 맞춰 생산하면 더 단단한 비스킷 함대가 출항합니다.</p>
          <div class="strategy-panel" aria-label="Route controls">
            <div class="region-switcher" aria-label="Region select">
              <button id="prevRegionButton" class="tool-button" type="button" aria-label="이전 지역">◀</button>
              <span id="regionLabel">1/3</span>
              <button id="nextRegionButton" class="tool-button" type="button" aria-label="다음 지역">▶</button>
            </div>
            <div class="lane-switcher" aria-label="Lane select">
              <button data-lane="top" class="tool-button" type="button">상</button>
              <button data-lane="bottom" class="tool-button" type="button">하</button>
            </div>
            <button id="styleButton" class="tool-button" type="button">기본</button>
            <button id="shareBattleButton" class="tool-button" type="button">기록</button>
            <button id="battleLikeButton" class="tool-button" type="button">응원</button>
          </div>
          <button id="spawnButton" class="spawn-button" type="button">굽기</button>
        </footer>
      </section>
    </main>
  </body>
</html>

<!doctype html>
<html lang="ko" data-webtoon-access="visitor">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net; style-src 'self' 'unsafe-inline'; connect-src 'self' https://anjbgbqkeukllsdxgckv.supabase.co wss://anjbgbqkeukllsdxgckv.supabase.co https://harvard-museum-nails-mission.trycloudflare.com; img-src 'self' data: blob: https://harvard-museum-nails-mission.trycloudflare.com; font-src 'self' data:; object-src 'none'; base-uri 'self'; form-action 'self'; frame-src 'none'; worker-src 'self' blob:">
  <meta name="webtoon-api-base" content="https://harvard-museum-nails-mission.trycloudflare.com">
    <meta name="description" content="완성한 웹툰 초안이나 공개 작품을 모바일 독자처럼 세로로 스크롤하며 감상합니다.">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://alchegit.github.io/webtoon/reader/">
    <meta property="og:title" content="웹툰 감상 | NeoKIM Webtoon Studio">
    <meta property="og:description" content="완성한 초안이나 공개 웹툰을 독자처럼 세로로 스크롤하며 감상하세요.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://alchegit.github.io/webtoon/reader/">
    <meta property="og:image" content="https://alchegit.github.io/webtoon/assets/webtoon-studio-og-v1.jpg">
    <title>웹툰 감상 | NeoKIM Webtoon Studio</title>
    <link rel="stylesheet" href="../webtoon.css?v=20260716-tunnel2">
    <link rel="stylesheet" href="../webtoon-app.css?v=20260721-reader2">
    <script defer src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.110.7"></script>
    <script defer src="../webtoon.js?v=20260721-reader2"></script>
    <script defer src="../webtoon-app.js?v=20260720-reader1"></script>
  </head>
  <body class="webtoon-app-page page-reader">
    <a class="skip-link" href="#readerCanvas">웹툰으로 이동</a>

    <header class="wt-topbar">
      <a class="brand-link" href="/webtoon/" aria-label="NeoKIM 웹툰 스튜디오 홈"><span aria-hidden="true">N</span><strong>WEBTOON STUDIO</strong></a>
      <nav class="topbar-nav" aria-label="웹툰 메뉴">
        <a href="/webtoon/">소개</a>
        <a href="/webtoon/studio/">작업대</a>
        <a href="/webtoon/guide/">가이드</a>
        <a href="/webtoon/templates/">템플릿</a>
        <a href="/webtoon/reader/" aria-current="page">감상</a>
        <a href="/webtoon/operator/" data-admin-only>운영</a>
        <a href="/webtoon/plan/" data-admin-only>설계</a>
      </nav>
      <div class="account-widget" data-account>
        <span class="account-name" data-account-name hidden></span>
        <span class="acorn-pill" data-acorns hidden>도토리 <strong data-acorn-count>--</strong></span>
        <button class="account-button" type="button" data-auth-action="login">Google로 로그인</button>
        <button class="account-button muted" type="button" data-auth-action="claim" hidden>도토리 받기</button>
        <button class="account-button ghost" type="button" data-auth-action="logout" hidden>로그아웃</button>
      </div>
    </header>

    <main class="wt-shell">
      <section class="page-head" aria-labelledby="readerTitle">
        <div>
          <p class="kicker">Reader preview</p>
          <h1 id="readerTitle">웹툰 감상</h1>
        </div>
        <dl class="reader-meta" aria-label="Reader stats">
          <div>
            <dt>전체 컷</dt>
            <dd id="readerPanels">--</dd>
          </div>
          <div>
            <dt>장르</dt>
            <dd id="readerGenre">--</dd>
          </div>
          <div>
            <dt>읽기</dt>
            <dd id="readerMinutes">--</dd>
          </div>
        </dl>
      </section>

      <div class="toolbar" aria-label="Reader actions">
        <a class="tool-button primary" href="/webtoon/studio/">내 웹툰 수정하기</a>
        <a class="tool-button" href="/webtoon/templates/">템플릿 보기</a>
        <label class="reader-language-field"><span>글자 언어</span><select id="readerLanguage" aria-label="웹툰 글자 언어"><option value="ko">한국어</option><option value="en">English</option><option value="ja">日本語</option></select></label>
      </div>

      <section class="reader-stage">
        <div id="readerCanvas" class="reader-scroll"></div>
      </section>
    </main>
    <div id="toast" class="toast" hidden role="status" aria-live="polite"></div>
  </body>
</html>
